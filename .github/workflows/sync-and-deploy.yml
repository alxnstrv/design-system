name: Sync Figma & Deploy Storybook

on:
  # Каждый день в 9:00 МСК (= 06:00 UTC)
  schedule:
    - cron: '0 6 * * *'
  # Ручной запуск из GitHub UI
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest data from Figma
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
        run: node fetch.cjs

      - name: Generate new story files (skip existing)
        run: node generate-stories.mjs --new-only

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json stories/
          if git diff --cached --quiet; then
            echo "Nothing changed, skipping commit"
          else
            git commit -m "chore: sync Figma components $(date -u '+%Y-%m-%d')"
            git push
          fi

      - name: Build Storybook
        run: npm run build-storybook

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
